<!DOCTYPE html>
<html>
<head>
    <title>Portfolio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
<div class="card">

<h1>{{ name }}</h1>
<p>{{ email }}</p>

<h2>Skills</h2>
{% for s in skills %}
<span class="tag green">{{ s }}</span>
{% endfor %}

<h2>About</h2>
<p>Passionate developer interested in Cloud & DevOps.</p>

<h2>Projects</h2>
<ul>
<li>AI Resume Analyzer</li>
<li>Portfolio Generator</li>
</ul>

</div>
</div>

</body>
</html>
